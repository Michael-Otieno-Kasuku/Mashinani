<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bursary Mashinani - User Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 1em;
    }

    main {
      margin: 20px;
    }

    form {
      max-width: 600px;
      margin: auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <header>
    <h1>Bursary Mashinani - User Interface</h1>
  </header>

  <main>
    <form>
      <label for="nationalId">National ID:</label>
      <input type="text" id="nationalId" name="nationalId" required>

      <label for="studentRegNumber">Student Registration Number:</label>
      <input type="text" id="studentRegNumber" name="studentRegNumber" required>

      <label for="institution">Select Institution:</label>
      <select id="institution" name="institution" required>
        <option value="daySecondary">Day Secondary School</option>
        <option value="boardingSecondary">Boarding Secondary School</option>
        <!-- Add more options based on your specific institutions -->

      </select>

      <button type="submit">Submit Application</button>
    </form>
  </main>

</body>
</html>
